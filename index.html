<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Bro 🎂</title>
    <style>
        body { margin:0; height:100vh; background:linear-gradient(135deg,#0f001a,#2a0055); color:white; font-family:Arial,sans-serif; text-align:center; display:flex; flex-direction:column; justify-content:center; align-items:center; }
        h1 { font-size:36px; margin:10px 0; }
        .subtitle { font-size:22px; margin:8px 0; }
        .wish { font-size:18px; max-width:620px; margin:15px auto; line-height:1.5; }
        .cake-container { margin:30px auto; width:300px; height:270px; position:relative; }
        .layer1 { width:260px;height:92px;background:linear-gradient(#c1121f,#e63939);border-radius:35px 35px 20px 20px;position:absolute;bottom:0;left:20px; }
        .layer2 { width:190px;height:72px;background:linear-gradient(#e63939,#ff4d6d);border-radius:28px 28px 18px 18px;position:absolute;bottom:85px;left:55px; }
        .top { width:145px;height:48px;background:linear-gradient(#fff7d1,#ffe68a);border-radius:50%;position:absolute;top:95px;left:77px; }
        .candle { width:18px;height:75px;background:linear-gradient(#ffeb3b,#ffd000);position:absolute;left:50%;top:45px;transform:translateX(-50%);border-radius:8px; }
        .flame { width:24px;height:30px;background:linear-gradient(#ff4500,#ffeb3b);border-radius:50% 50% 40% 40%;position:absolute;top:-33px;left:50%;transform:translateX(-50%);animation:flicker 0.07s infinite alternate; }
        
        .slideshow { display:none; width: 400px; height: 400px; position: relative; border: 5px solid white; border-radius: 15px; overflow: hidden; background: black; }
        .slide { width:100%; height:100%; object-fit:contain; position:absolute; top:0; left:0; opacity:0; transition:opacity 1s; }
        
        #footer { display:none; font-size: 32px; color: #ffeb3b; font-weight: bold; opacity: 0; transition: opacity 2s ease-in-out; text-shadow: 0 0 15px #ff4500; }
        
        #startButton { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #ff4d6d; color: white; border: none; border-radius: 50px; margin-top: 20px; transition: 0.3s; }
        #startButton:hover { transform: scale(1.1); }
        
        @keyframes flicker { from { transform:translateX(-50%) scale(1); } to { transform:translateX(-50%) scale(1.4); } }
    </style>
</head>
<body>
    <audio id="birthdaySong" src="mage.mp3" loop></audio>

    <div id="startScreen">
        <h1>Happy Birthday! 🎉</h1>
        <button id="startButton">اضغط هنا لبدء المفاجأة 🎁</button>
    </div>

    <div id="cakePage" style="display:none;">
        <h1>Happy Birthday Bro! 🎉</h1>
        <p class="subtitle">كل سنة وأنت طيب يا أخويا ❤️</p>
        <p class="wish">Every year and you are kinder, stronger, and more successful.<br><br>I wish you endless success, good health, happiness, and all the best in life.</p>
        <div class="cake-container">
            <div class="layer1"></div>
            <div class="layer2"></div>
            <div class="top"></div>
            <div class="candle"><div class="flame"></div></div>
        </div>
    </div>

    <div id="slideshow" class="slideshow">
        <img class="slide" src="1.jpg">
        <img class="slide" src="2.jpg">
        <img class="slide" src="3.jpg">
        <img class="slide" src="4.jpg">
        <img class="slide" src="5.jpg">
    </div>
    
    <div id="footer">Made by Ahmed Ramadan ❤️</div>

    <script>
        document.getElementById('startButton').addEventListener('click', function() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('cakePage').style.display = 'block';
            document.getElementById('birthdaySong').play();
            
            setTimeout(() => {
                document.getElementById('cakePage').style.display = 'none';
                document.getElementById('slideshow').style.display = 'block';
                
                let current = 0;
                const slides = document.querySelectorAll('.slide');
                
                function showNext() {
                    slides.forEach(s => s.style.opacity = 0);
                    if (current < slides.length) {
                        slides[current].style.opacity = 1;
                        current++;
                    } else {
                        clearInterval(interval);
                        document.getElementById('slideshow').style.display = 'none';
                        const footer = document.getElementById('footer');
                        footer.style.display = 'block';
                        setTimeout(() => { footer.style.opacity = 1; }, 100);
                    }
                }
                
                showNext();
                // تم تعديل التوقيت إلى 3000 ملي ثانية (3 ثوانٍ)
                const interval = setInterval(showNext, 3000); 
            }, 5000);
        });
    </script>
</body>
</html>
